spring:
  application:
    name: dasnSimei
  config:
    import: optional:file:./databaseInfo.yml
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false
springdoc:
  paths-to-match: /v1/movimentos/**
  swagger-ui:
    use-root-path: true