name: Docker CI
on:
  push:
    branches: 
    - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v4

    - name: Login no Docker
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
    
    - name: Instalar a JDK
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    - name: Buildar o Jar do app
      working-directory: ./
      run: mvn clean package
          
    - name: Montagem do Docker Compose
      working-directory: ./
      run: docker compose build

    - name: Criando a Imagem Docker da Aplicacao
      run: docker tag ${{ secrets.DOCKER_USERNAME }}/dasnSimei:latest ${{ secrets.DOCKER_USERNAME }}/dasnSimei:${{ github.run_id }}
      
    - name: Enviar imagem para o DockerHub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/dasnSimei:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/dasnSimei:${{ github.run_id }}
